# ═══════════════════════════════════════════════════════════════════════════════
# SOVERSTACK CORE DATABASES - Mandatory databases (Auto-generated)
# ═══════════════════════════════════════════════════════════════════════════════
#
# This file contains the mandatory databases for Soverstack core services.
# DO NOT modify this file - your custom databases should go in databases.yaml
#
# Documentation: https://docs.soverstack.io/mandatory-databases
#
# Mandatory databases:
#   - keycloak:   IAM/SSO authentication (Keycloak)
#   - headscale:  VPN coordination (Headscale)
#   - powerdns:   DNS zone records (PowerDNS)
#   - openbao:    Secrets audit logs (OpenBao)
#
# These databases are required for the core infrastructure to function.
# They are hosted on the PostgreSQL cluster defined in core-compute.yaml.
#
# ═══════════════════════════════════════════════════════════════════════════════

clusters:
  # ─────────────────────────────────────────────────────────────────────────────
  # CORE INFRASTRUCTURE CLUSTER
  # ─────────────────────────────────────────────────────────────────────────────
  - name: core-infrastructure      # Unique cluster identifier
    type: postgresql
    version: "16"

    cluster:
      name: pg-core                # Patroni cluster name
      ha: true
      vm_ids: [250, 251, 252]      # PostgreSQL VMs from core-compute.yaml

    port: 5432
    ssl: required

    # Mandatory databases for core services
    databases:
      - name: soverstack
        owner: soverstack

      - name: keycloak
        owner: keycloak

      - name: headscale
        owner: headscale

      - name: powerdns
        owner: powerdns

      - name: openbao
        owner: openbao

      - name: grafana
        owner: grafana

    credentials:
      type: vault
      path: secret/data/postgres/core

    backup:
      storage_backend: s3-backup
      schedule: "0 2 * * *"        # Daily at 2 AM
      retention:
        daily: 7
        weekly: 4
        monthly: 12
      type: wal_archive
