  #   os_template: debian-12-cloudinit

# Define your application VMs
virtual_machines:
  # Example:
  # - name: myapp-01
  #   vm_id: 3001
  #   host: pve-01
  #   role: general_purpose
  #   type_definition: app-small

# Define your Linux containers (optional)
linux_containers: []
