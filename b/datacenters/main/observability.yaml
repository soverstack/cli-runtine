# ═══════════════════════════════════════════════════════════════════════════
# OBSERVABILITY LAYER - Monitoring, Audit & Compliance
# ═══════════════════════════════════════════════════════════════════════════
#
# This layer provides comprehensive observability with:
# - Monitoring: Prometheus + Grafana + Loki (metrics, logs, dashboards)
# - Audit: Falco + Auditd (security events, runtime protection)
# - Compliance: Wazuh + OpenSCAP (PCI-DSS, GDPR, CIS, vulnerability detection)
#
# Best practices:
# - Start with monitoring enabled in all environments
# - Enable audit in production for security
# - Enable compliance for regulated industries
#
# ═══════════════════════════════════════════════════════════════════════════

enabled: true # Disable in local for resource efficiency

# ─────────────────────────────────────────────────────────────────────────
# MONITORING STACK (Prometheus + Grafana + Loki)
# ─────────────────────────────────────────────────────────────────────────
monitoring:
  enabled: true

  prometheus:
    enabled: true
    retention_days: 30
    storage_size: "100Gi"
    scrape_interval: "30s"
    evaluation_interval: "30s"
    vm_id: 4001 # Dedicated VM for Prometheus in enterprise

    # System metrics
    node_exporter: true

    # Service discovery
    kubernetes_sd: true
    # static_targets:
    #   - "node1:9100" # Node exporter
    #   - "node2:9100"

  grafana:
    enabled: true

    # ⚠️ SÉCURITÉ: Store password in .env file
    admin_password_env_var: "GRAFANA_ADMIN_PASSWORD"
    # admin_password_vault_path: "secret/observability/grafana/admin_password"

    sub_domain: "grafana.example.com"
    accessible_outside_vpn: true # Only local/dev accessible outside VPN

    # Pre-configured dashboards
    default_dashboards:
      kubernetes_cluster: true
      node_metrics: true
      prometheus_stats: true
      loki_logs: true

    datasources:
      # Auto-detected if not provided
      # prometheus_url: "http://prometheus:9090"
      # loki_url: "http://loki:3100"

  loki:
    enabled: true
    retention_days: 14
    storage_size: "50Gi"

    # Log collection
    promtail: true # Log shipper for all nodes

    # Structured logging
    enable_structured_metadata: true # Parse JSON logs

  alertmanager:
    enabled: true

    # Email notifications
    smtp_host: "smtp.example.com"
    smtp_port: 587
    smtp_username_env_var: "SMTP_USERNAME"
    smtp_password_env_var: "SMTP_PASSWORD"
    smtp_from: "alerts@example.com"
    alert_email: "admin@example.com"

    # Webhook (e.g., Slack, Discord)
    # webhook_url: "https://hooks.slack.com/services/YOUR/WEBHOOK/URL"

    # Alert grouping
    group_wait: "30s"
    group_interval: "5m"
    repeat_interval: "4h"

  # Metrics retention
  metrics_retention:
    raw_metrics_days: 15
    aggregated_metrics_days: 90

# ─────────────────────────────────────────────────────────────────────────
# AUDIT STACK (Falco + Auditd)
# ─────────────────────────────────────────────────────────────────────────
audit:
  enabled: true # Critical for production security

  falco:
    enabled: true

    # Security rules
    rule_set: "strict"
    # custom_rules_path: "/etc/falco/custom_rules.yaml"

    # Alert threshold
    alert_priority: "critical"

    # Output destinations
    outputs:
      syslog: true
      file: true
      stdout: false
      http:
        enabled: true
        url: "https://your-webhook-url.com/falco" # Slack, PagerDuty, etc.
        # insecure_skip_verify: false

    # Monitored events
    monitor:
      privilege_escalation: true # sudo/su detection
      sensitive_file_access: true # /etc/shadow, /etc/passwd
      unexpected_network_connections: true
      container_escapes: true
      kernel_module_load: true
      binary_execution: true # Execution in /tmp

  auditd:
    enabled: true

    # Configuration
    log_format: "enriched" # enriched = JSON format
    max_log_file_size: 100 # MB
    max_log_files: 10 # Rotation count
    log_directory: "/var/log/audit"

    # Audit rules (pre-configured)
    audit_syscalls: true # Monitor system calls
    audit_file_changes: true # Monitor /etc, /bin, etc.
    audit_user_actions: true # Logins, sudo, su
    audit_network: true
    audit_privileged_commands: true # setuid/setgid binaries

  # Centralized audit log storage
  audit_log_forwarding:
    enabled: true
    destination: "loki" # loki | elasticsearch | s3 | local
    # destination_url: "http://loki:3100"

# ─────────────────────────────────────────────────────────────────────────
# COMPLIANCE STACK (Wazuh + OpenSCAP)
# ─────────────────────────────────────────────────────────────────────────
# Security level determines which protections are enabled automatically.
# No need to enable everything - choose what fits your needs.
#
# Levels:
# - essential: Side project, prototype - basic monitoring
# - standard:  SMB, SaaS - audit logs, MFA, encrypted backups
# - advanced:  Large company - SIEM, bastion, intrusion detection
# - regulated: Bank, Healthcare - 1 year logs, dual approval, 24/7 monitoring
#
compliance:
  level: "regulated"

  enabled: true

  wazuh:
    enabled: true

    # Wazuh manager
    manager_vm_id: 4002

    # Agent groups
    agent_groups:
      - "kubernetes"
      - "production"

    # Compliance rules (enabled based on level)
    rules:
      pci_dss: true
      gdpr: true
      hipaa: true
      cis: true
      tsc: true
      iso_27001: true

    # Security modules
    vulnerability_detection: true
    file_integrity_monitoring: true
    security_configuration_assessment: true
    docker_monitoring: true
    cloud_security_monitoring: true

    # Alerts
    alert_level: 3
    email_alerts: true
    email_to: "security@example.com"

    # Integration
    integrate_with_loki: true
    integrate_with_prometheus: true

  openscap:
    enabled: true

    # Scan frequency
    scan_schedule: "0 2 * * 0" # Weekly: Sunday at 2 AM

    # SCAP profiles
    profiles:
      - "cis"
      - "pci-dss"
      - "stig"

    # Remediation
    remediation: false # ⚠️ Test in non-prod first!
    remediation_dry_run: true

    # Reports
    report_storage: "/var/lib/scap/reports"
    report_format: "all"

    # Thresholds
    fail_on_severity: "high"

  # Compliance reports
  compliance_reports:
    enabled: true
    schedule: "0 9 1 * *" # Monthly: 1st of month at 9 AM
    recipients:
      - "compliance@example.com"
      - "security@example.com"
    format: "pdf"

# ─────────────────────────────────────────────────────────────────────────
# CENTRALIZED LOGGING
# ─────────────────────────────────────────────────────────────────────────
log_aggregation:
  enabled: true

  # Retention policy
  retention_policy:
    hot_storage_days: 7 # SSD
    warm_storage_days: 30 # HDD
    cold_storage_days: 730 # Archive

  # Log parsing
  structured_logging: true # JSON parsing
  log_enrichment: true # Add metadata

  # Log sources
  sources:
    kubernetes: true
    system: true
    audit: true
    application: true

# ─────────────────────────────────────────────────────────────────────────
# DASHBOARDS & VISUALIZATION
# ─────────────────────────────────────────────────────────────────────────
dashboards:
  security_overview: true
  compliance_status: true
  audit_timeline: true
  threat_detection: true
  performance_metrics: true
  cost_tracking: true

# ─────────────────────────────────────────────────────────────────────────
# ALERTING RULES (pre-configured)
# ─────────────────────────────────────────────────────────────────────────
alerting:
  enabled: true

  # Infrastructure alerts
  infrastructure_alerts:
    cpu_high: true # CPU > 80% for 5 min
    memory_high: true # Memory > 85% for 5 min
    disk_full: true # Disk > 90%
    node_down: true

  # Security alerts
  security_alerts:
    failed_logins: true
    privilege_escalation: true
    file_integrity_violation: true
    malware_detected: true
    compliance_violation: true

  # Application alerts
  application_alerts:
    pod_crashloop: true
    high_error_rate: true
    slow_response_time: true
    cert_expiry: true
