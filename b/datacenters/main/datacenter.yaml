# ============================================================
# DATACENTER CONFIGURATION - MAIN
# ============================================================
#
# REQUIREMENTS: PRODUCTION/ENTERPRISE
# - Minimum 3 server(s) for High Availability
# - Odd number recommended for quorum
# - Ceph requires 10 GbE networking
#
# ============================================================

name: "main"
location: ""  # e.g., "Paris, France"

# ------------------------------------------------------------
# SOVERSTACK RUNTIME
# ------------------------------------------------------------
# VM where Soverstack CLI runs Terraform/Ansible
soverstack:
  vm_id: 450            # VM ID in TOOLS range (450-469)


# ------------------------------------------------------------
# PROXMOX SERVERS (PVE Cluster)
# ------------------------------------------------------------
# ip: Public IP for SSH connection (from your hosting provider)
servers:
  - name: pve-main-01
    id: 1
    ip: ""            # Public IP (e.g., 51.210.xxx.xxx)
    port: 22
    password:
      type: env
      var_name: "ROOT_PASSWORD_PVE01"
    os: proxmox
    disk_encryption:
      enabled: false
      password:
        type: env
        var_name: "DISK_ENCRYPTION_PASSWORD"

  # - name: pve-main-02
  #   id: 2
  #   ip: ""          # Public IP
  #   port: 22
  #   password:
  #     type: env
