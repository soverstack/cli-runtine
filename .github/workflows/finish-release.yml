name: Finish Release

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/cli-runtime

jobs:
  finish:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/heads/release/')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          VERSION=$(jq -r .version package.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          IFS='.' read -r major minor patch <<< "$VERSION"
          NEXT="$major.$((minor + 1)).0-dev"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"

      # Step 1: Merge release into main and create tag
      - name: Merge into main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="${GITHUB_REF#refs/heads/}"
          VERSION="${{ steps.version.outputs.version }}"

          git fetch origin main
          git checkout main
          git merge "$BRANCH" --no-ff -m "release: v$VERSION"
          git tag "v$VERSION"
          git push origin main
          git push origin "v$VERSION"

      # Step 2: Build and push stable image (HEAD is on main)
      - name: Build and push stable image
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker build -t ${{ env.IMAGE_NAME }}:${VERSION} -t ${{ env.IMAGE_NAME }}:latest .
          docker push ${{ env.IMAGE_NAME }}:${VERSION}
          docker push ${{ env.IMAGE_NAME }}:latest

      # Step 3: Merge back into develop and bump version
      - name: Bump develop
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          VERSION="${{ steps.version.outputs.version }}"
          NEXT="${{ steps.version.outputs.next }}"
          BRANCH="${GITHUB_REF#refs/heads/}"

          git fetch origin develop
          git checkout develop
          git merge main --no-ff -m "merge: v$VERSION back into develop"
          jq --arg v "$NEXT" '.version = $v' package.json > tmp.json && mv tmp.json package.json
          git add package.json
          git commit -m "bump version to $NEXT"
          git push origin develop

          git push origin --delete "$BRANCH"

      - name: Summary
        run: |
          echo "### Release v${{ steps.version.outputs.version }} finished" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image \`${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}\` published" >> "$GITHUB_STEP_SUMMARY"
          echo "- Merged into \`main\` and back into \`develop\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`develop\` bumped to \`${{ steps.version.outputs.next }}\`" >> "$GITHUB_STEP_SUMMARY"
